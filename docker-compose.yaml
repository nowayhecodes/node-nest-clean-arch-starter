# ─────────────────────────────────────────────────────────────────────────────
# Full local stack:
#   app          – NestJS application (built from Dockerfile)
#   postgres     – PostgreSQL 16 (tenant-manager + tenant data)
#   redis        – Redis 7 (cache / session store, ready to wire)
#   otel-collector – OpenTelemetry Collector (receives OTLP, fans out to backends)
#   jaeger       – Distributed trace UI  → http://localhost:16686
#
# Usage:
#   docker compose up --build          # first run
#   docker compose up -d               # detached
#   docker compose down -v             # stop + delete volumes
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: nest_app
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Override DB hosts to use docker service names
      DB_HOST: postgres
      TENANT_DB_HOST: postgres
      REDIS_HOST: redis
      # OpenTelemetry — point to the local collector
      OTEL_ENABLED: 'true'
      OTEL_SERVICE_NAME: nest-app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - backend

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nest_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      # The tenant-manager DB is created automatically by postgres.
      # Tenant application DBs are created at runtime by the app.
      POSTGRES_DB: ${DB_NAME:-tenant_manager}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nest_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASS:-redis_secret}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASS:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── OpenTelemetry Collector ──────────────────────────────────────────────────
  # Uses the "contrib" image which ships all community exporters
  # (Datadog, Elasticsearch, New Relic, Honeycomb, …).
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: nest_otel_collector
    restart: unless-stopped
    command: ['--config=/etc/otelcol-contrib/config.yaml']
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - '4317:4317' # OTLP gRPC receiver
      - '4318:4318' # OTLP HTTP receiver
      - '8889:8889' # Prometheus metrics scrape endpoint
    environment:
      # Pass backend credentials from host environment — they are referenced
      # inside otel-collector-config.yaml with ${VAR_NAME} syntax.
      DATADOG_API_KEY: ${DATADOG_API_KEY:-}
      NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY:-}
      ELASTIC_APM_SECRET_TOKEN: ${ELASTIC_APM_SECRET_TOKEN:-}
      GRAFANA_CLOUD_TOKEN: ${GRAFANA_CLOUD_TOKEN:-}
      HONEYCOMB_API_KEY: ${HONEYCOMB_API_KEY:-}
    depends_on:
      - jaeger
    networks:
      - backend

  # ── Jaeger (local trace visualiser) ─────────────────────────────────────────
  # UI: http://localhost:16686
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: nest_jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686' # Jaeger UI
      - '14317:4317' # OTLP gRPC (host-side offset to avoid conflict with collector)
    networks:
      - backend

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
